name: Sync seating plan & exam schedule

on:
  # Primary (fast) trigger: a Google Apps Script polls the mailbox every minute
  # and fires this via the GitHub API the moment a new "seating"/"schedule"
  # email arrives — see docs/seating-gmail-trigger.gs for setup.
  repository_dispatch:
    types: [new-seating-email]
  # Safety-net trigger: in case the Apps Script trigger is ever paused/removed,
  # still check every 30 min so nothing gets stuck for too long. A run with no
  # new email is a harmless no-op (no commit, no deploy).
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Gmail (seating plan or exam schedule)
        env:
          # Mailbox to read from (not sensitive).
          GMAIL_USER: compilersociety@gmail.com
          # 16-char Gmail App Password — add this as a repo secret named GMAIL_PASS.
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python api/fetch-timetable.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dbfolder/seating-plan.json dbfolder/exam-schedule-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync seating plan / exam schedule from Gmail"
            git pull --rebase origin main || true
            git push
          fi
