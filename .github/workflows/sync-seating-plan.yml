name: Sync seating plan & exam schedule

on:
  # Poll the mailbox every 15 minutes. GitHub runs this entirely on its own — no
  # external service needed. When a new "seating"/"schedule" email exists it is
  # parsed and committed; when there's nothing new the run is a harmless no-op
  # (no commit, no deploy). Adjust the cadence below if you want faster pickup.
  schedule:
    - cron: "*/15 * * * *"
  # Optional instant trigger if the Google Apps Script is ever set up
  # (docs/seating-gmail-trigger.gs), plus a manual "Run workflow" fallback.
  repository_dispatch:
    types: [new-seating-email]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Gmail (seating plan or exam schedule)
        env:
          # Mailbox to read from (not sensitive).
          GMAIL_USER: compilersociety@gmail.com
          # 16-char Gmail App Password — add this as a repo secret named GMAIL_PASS.
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python api/fetch-timetable.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dbfolder/seating-plan.json dbfolder/exam-schedule-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync seating plan / exam schedule from Gmail"
            git pull --rebase origin main || true
            git push
          fi
