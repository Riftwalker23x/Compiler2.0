name: Sync seating plan, exam schedule & show up schedule

on:
  # Primary (fast) trigger: a Google Apps Script polls the mailbox every minute
  # and fires this via the GitHub API the moment a new "seating"/"schedule"/
  # "showup" email arrives — see docs/seating-gmail-trigger.gs for setup.
  repository_dispatch:
    types: [new-seating-email]
  # Safety-net trigger: in case the Apps Script trigger is ever paused/removed,
  # still check every 30 min so nothing gets stuck for too long. A run with no
  # new email is a harmless no-op (no commit, no deploy).
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Gmail (seating plan, exam schedule, or show up schedule)
        env:
          # Mailbox to read from (not sensitive).
          GMAIL_USER: compilersociety@gmail.com
          # 16-char Gmail App Password — add this as a repo secret named GMAIL_PASS.
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python api/fetch-timetable.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Add each output only if it exists - some appear only once their
          # feature has synced at least once (e.g. showup-sheet-source.json is
          # created only after a show-up email's sheet link is discovered), and
          # a plain "git add" of a missing path aborts the whole step.
          for f in dbfolder/seating-plan.json dbfolder/exam-schedule-*.json dbfolder/showup-schedule-*.json dbfolder/showup-sheet-source.json; do
            [ -e "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync seating plan / exam schedule / show up schedule from Gmail"
          # This workflow can be triggered concurrently (Apps Script dispatch +
          # the 30-min schedule + poll-showup-sheet.yml all write to dbfolder/),
          # so a push can race and get rejected as non-fast-forward. Retry with
          # a rebase onto the latest remote each time instead of failing the run.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((RANDOM % 8 + 3))
          done
          echo "Push failed after 5 attempts"
          exit 1
