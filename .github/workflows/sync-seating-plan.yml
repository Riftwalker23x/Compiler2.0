name: Sync seating plan

on:
  schedule:
    # Every hour. Change to "*/30 * * * *" during exam weeks for faster pickup,
    # or trigger instantly from the Actions tab (Run workflow) when the email lands.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync seating plan from Gmail
        env:
          # Mailbox to read seating-plan emails from (not sensitive).
          GMAIL_USER: compilersociety@gmail.com
          # 16-char Gmail App Password — add this as a repo secret named GMAIL_PASS.
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python api/fetch-timetable.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dbfolder/seating-plan.json
          if git diff --cached --quiet; then
            echo "No seating-plan changes to commit"
          else
            git commit -m "Sync seating plan from Gmail"
            git pull --rebase origin main || true
            git push
          fi
