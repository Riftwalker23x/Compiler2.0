name: Generate timetables

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-timetables
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service-account credential
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing required GOOGLE_SERVICE_ACCOUNT_JSON repository secret"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Generate timetables
        run: python python/scripts/Script.py

      - name: Commit generated timetable data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/timetables
          if git diff --cached --quiet; then
            echo "No timetable changes to commit"
            exit 0
          fi
          git commit -m "Generate timetables"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((RANDOM % 8 + 3))
          done
          echo "Push failed after 5 attempts"
          exit 1
