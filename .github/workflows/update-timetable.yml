name: Update timetable

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Decode service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_B64" | base64 --decode > service-account.json

      - name: Generate timetable
        run: python generate_timetable.py

      - name: Sanity check
        run: |
          if ls db/timetable-*.json 1>/dev/null 2>&1; then
            for f in db/timetable-*.json; do
              SIZE=$(stat --format=%s "$f")
              ENTRIES=$(python -c "import json; d=json.load(open('$f')); print(d.get('count',0))")
              echo "$f: ${SIZE} bytes, ${ENTRIES} entries"
              if [ "$SIZE" -lt 100 ] || [ "$ENTRIES" -eq 0 ]; then
                echo "ERROR: $f looks empty or too small"
                exit 1
              fi
            done
          else
            echo "ERROR: No timetable files generated in db/"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update timetable data [skip ci]"
            git push
          fi
